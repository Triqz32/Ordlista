<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Word Dictionary</title>

<style>

body{
    margin:0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    min-height:100vh;
}

h1{
    text-align:center;
    padding:40px 0;
    font-size:40px;
    letter-spacing:2px;
}

#wordContainer{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* word cards */

.word{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    transition:0.3s;
    border:1px solid rgba(255,255,255,0.15);
}

/* hover effect */

.word:hover{
    transform: translateY(-5px) scale(1.02);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.word h2{
    margin:0 0 10px 0;
    font-size:26px;
    color:#00e5ff;
}

.word p{
    margin:0;
    line-height:1.6;
    color:#e0e0e0;
}

footer{
    text-align:center;
    padding:20px;
    opacity:0.6;
}

</style>
</head>

<body>

<h1>📚 Min Ord Lista 🥀</h1>

<div id="wordContainer"></div>

<footer>
Gjord av Elias/Ilyas
</footer>
